<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP Rokadpada</title>
<style>
body.dark { background:#0f172a; color:#e5e7eb; }
body.dark .top-bar { background:#1e293b; }
#darkToggle { padding:10px 20px; border-radius:25px; cursor:pointer; margin:12px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
fetch("main.html")
  .then(res => res.text())
  .then(data => {
    const app = document.getElementById("app");
    app.innerHTML = data;

    // 🔥 Re-run scripts from main.html
    const scripts = app.querySelectorAll("script");
    scripts.forEach(oldScript => {
      const newScript = document.createElement("script");
      if(oldScript.src){
        newScript.src = oldScript.src;
      } else {
        newScript.textContent = oldScript.textContent;
      }
      document.body.appendChild(newScript);
      oldScript.remove();
    });

    // 🔥 Dark Mode Listener (attach after fetch)
    const toggle = document.getElementById("darkToggle");
    if(toggle){
      // Load saved mode
      if(localStorage.getItem("mode") === "dark") document.body.classList.add("dark");

      toggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        if(document.body.classList.contains("dark")){
          localStorage.setItem("mode","dark");
          toggle.innerText = "☀️ Light Mode";
        } else {
          localStorage.setItem("mode","light");
          toggle.innerText = "🌙 Dark Mode";
        }
      });

      // Set initial button text
      toggle.innerText = document.body.classList.contains("dark") ? "☀️ Light Mode" : "🌙 Dark Mode";
    }
  });
</script>
  <div class="gallery">
  <button id="prev">&#10094;</button>
  <div class="slides">
    <img src="https://drive.google.com/uc?export=view&id=1OEyLXfgLb_h0Ks0gv6yaK9QhZ9tzSWrf" class="slide active">
    <img src="https://drive.google.com/uc?export=view&id=1n95Qy4BPz2jYwBdn..." class="slide">
    <!-- add more images -->
  </div>
  <button id="next">&#10095;</button>
</div>

<style>
.gallery { position: relative; width: 80%; margin: auto; overflow: hidden; }
.slides { display: flex; transition: transform 0.5s ease; }
.slide { min-width: 100%; display: none; }
.slide.active { display: block; }
button { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; font-size: 2rem; cursor: pointer; padding: 0.5rem; }
#prev { left: 10px; }
#next { right: 10px; }
</style>

<script>
const slides = document.querySelectorAll('.slide');
const nextBtn = document.getElementById('next');
const prevBtn = document.getElementById('prev');
let current = 0;

// Show the current slide
function showSlide(index) {
  slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
}

// Next slide
function nextSlide() {
  current = (current + 1) % slides.length;
  showSlide(current);
}

// Previous slide
function prevSlide() {
  current = (current - 1 + slides.length) % slides.length;
  showSlide(current);
}

// Button event listeners
nextBtn.addEventListener('click', nextSlide);
prevBtn.addEventListener('click', prevSlide);

// Auto-slide every 3 seconds
setInterval(nextSlide, 3000);

// Initialize
showSlide(current);
</script>
</body>
</html>
