<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>ग्रामपंचायत रोकडपाडा | Grampanchayat Rokadpada</title>
<meta name="description" content="गावाची माहिती, सेवा, दाखले, कर भरा, तक्रार नोंदवा, कृषी, शिक्षण, आरोग्य विभागांची माहिती.">
<link rel="icon" href="https://i.ibb.co/95X4CMF/20260321-150318.png" type="image/png">
<title>Grampanchayat Rokadpada</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
 <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<title>GP Rokadpada</title>
<style>
body.dark { background:#0f172a; color:#e5e7eb; }
body.dark .top-bar { background:#1e293b; }
#darkToggle { padding:10px 20px; border-radius:25px; cursor:pointer; margin:12px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
fetch("main.html")
  .then(res => res.text())
  .then(data => {
    const app = document.getElementById("app");
    app.innerHTML = data;

    // 🔥 Re-run scripts from main.html
    const scripts = app.querySelectorAll("script");
    scripts.forEach(oldScript => {
      const newScript = document.createElement("script");
      if(oldScript.src){
        newScript.src = oldScript.src;
      } else {
        newScript.textContent = oldScript.textContent;
      }
      document.body.appendChild(newScript);
      oldScript.remove();
    });

    // 🔥 Dark Mode Listener (attach after fetch)
    const toggle = document.getElementById("darkToggle");
    if(toggle){
      // Load saved mode
      if(localStorage.getItem("mode") === "dark") document.body.classList.add("dark");

      toggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        if(document.body.classList.contains("dark")){
          localStorage.setItem("mode","dark");
          toggle.innerText = "☀️ Light Mode";
        } else {
          localStorage.setItem("mode","light");
          toggle.innerText = "🌙 Dark Mode";
        }
      });

      // Set initial button text
      toggle.innerText = document.body.classList.contains("dark") ? "☀️ Light Mode" : "🌙 Dark Mode";
    }
  });
</script>
  

</body>
</html>
