<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GP Rokadpada</title>
</head>

<body>

<div id="app"></div>
<script>
  function initMenuSearchTranslate() {
  // MENU
  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  if(menuBtn && sidebar && overlay){
    menuBtn.addEventListener("click", ()=>{
      menuBtn.classList.toggle("active");
      sidebar.classList.toggle("active");
      overlay.classList.toggle("active");
    });
    overlay.addEventListener("click", ()=>{
      menuBtn.classList.remove("active");
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
  }

  // SEARCH
  const searchIcon = document.getElementById("searchIcon");
  const topSearch = document.getElementById("topSearch");
  const closeSearch = document.getElementById("closeSearch");
  if(searchIcon && topSearch && closeSearch){
    searchIcon.addEventListener("click", ()=>topSearch.classList.add("active"));
    closeSearch.addEventListener("click", ()=>topSearch.classList.remove("active"));
  }

  // GOOGLE TRANSLATE
  if(typeof googleTranslateElementInit === "function"){
    googleTranslateElementInit();
  }else{
    window.googleTranslateElementInit = function(){
      new google.translate.TranslateElement({pageLanguage:'mr'}, 'google_translate_element');
    }
    const s = document.createElement("script");
    s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
    document.body.appendChild(s);
  }
}

// call after inserting html
initMenuSearchTranslate();
async function loadPage() {
  const res = await fetch("main.html");
  let html = await res.text();

  // Remove <html>, <head>, <body> tags if present
  html = html.replace(/<script src="[^"]+"><\/script>/g, ''); // remove external scripts temporarily
  document.getElementById("app").innerHTML = html;

  // Re-insert external scripts
  const extScripts = [
    "//translate.google.com/translate_a/element.js"
  ];
  extScripts.forEach(src => {
    const s = document.createElement("script");
    s.src = src;
    s.async = true;
    document.body.appendChild(s);
  });

  // Now run your inline scripts
  const darkToggle = document.getElementById("darkToggle");
  if(darkToggle){
    if(localStorage.getItem("mode") === "dark"){
      document.body.classList.add("dark");
      darkToggle.innerText = "☀️ Light Mode";
    }
    darkToggle.addEventListener("click", ()=>{
      document.body.classList.toggle("dark");
      if(document.body.classList.contains("dark")){
        localStorage.setItem("mode","dark");
        darkToggle.innerText = "☀️ Light Mode";
      }else{
        localStorage.setItem("mode","light");
        darkToggle.innerText = "🌙 Dark Mode";
      }
    });
  }

  // Initialize Google Translate if needed
  if(typeof googleTranslateElementInit === "function"){
    googleTranslateElementInit();
  }
}

loadPage();
</script>


</body>
</html>
