<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GP Rokadpada</title>
</head>

<body>

<div id="app"></div>
<script>
async function loadPage() {
  const res = await fetch("main.html");
  let html = await res.text();

  // Remove <html>, <head>, <body> tags if present
  html = html.replace(/<script src="[^"]+"><\/script>/g, ''); // remove external scripts temporarily
  document.getElementById("app").innerHTML = html;

  // Re-insert external scripts
  const extScripts = [
    "//translate.google.com/translate_a/element.js"
  ];
  extScripts.forEach(src => {
    const s = document.createElement("script");
    s.src = src;
    s.async = true;
    document.body.appendChild(s);
  });

  // Now run your inline scripts
  const darkToggle = document.getElementById("darkToggle");
  if(darkToggle){
    if(localStorage.getItem("mode") === "dark"){
      document.body.classList.add("dark");
      darkToggle.innerText = "☀️ Light Mode";
    }
    darkToggle.addEventListener("click", ()=>{
      document.body.classList.toggle("dark");
      if(document.body.classList.contains("dark")){
        localStorage.setItem("mode","dark");
        darkToggle.innerText = "☀️ Light Mode";
      }else{
        localStorage.setItem("mode","light");
        darkToggle.innerText = "🌙 Dark Mode";
      }
    });
  }

  // Initialize Google Translate if needed
  if(typeof googleTranslateElementInit === "function"){
    googleTranslateElementInit();
  }
}

loadPage();
</script>

<script>
fetch("main.html")
.then(res => res.text())
.then(data => {
  const app = document.getElementById("app");
  app.innerHTML = data;

  // 🔥 FIX: run ALL scripts (inline + external)
  const scripts = app.querySelectorAll("script");

  scripts.forEach(oldScript => {
    const newScript = document.createElement("script");

    // copy attributes (IMPORTANT for external scripts)
    [...oldScript.attributes].forEach(attr => {
      newScript.setAttribute(attr.name, attr.value);
    });

    // inline script
    if (oldScript.textContent) {
      newScript.textContent = oldScript.textContent;
    }

    document.body.appendChild(newScript);
  });
});
</script>

</body>
</html>
