<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP Rokadpada</title>
<style>
body{margin:0;font-family:sans-serif;transition:.3s}body.dark{background:#222;color:#fff;}
#sidebar{width:250px;background:#ccc;position:fixed;top:0;bottom:0;left:-250px;transition:.3s;padding:1em;z-index:1000;}
#sidebar.active{left:0;}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;z-index:900;}
#overlay.active{display:block;}
#topSearch{display:none;position:fixed;top:0;left:0;right:0;padding:1em;background:#fff;z-index:1001;}
#topSearch.active{display:block;}
#topSearch input{width:80%;padding:.5em;}
#topSearch button{padding:.5em;}
</style>
</head>
<body>

<div id="app"></div>
<div id="overlay"></div>

<script>
async function loadMain() {
  const res = await fetch('main.html');
  const html = await res.text();
  document.getElementById('app').innerHTML = html;

  const $ = id => document.getElementById(id);

  // 🔥 Menu toggle
  const menuBtn = $('menuBtn');
  const sidebar = $('sidebar');
  const overlay = $('overlay');
  if(menuBtn && sidebar && overlay){
    menuBtn.addEventListener("click", ()=>{
      sidebar.classList.add("active");
      overlay.classList.add("active");
    });
    overlay.addEventListener("click", ()=>{
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
  }

  // 🔥 Search toggle
  const searchIcon = $('searchIcon');
  const topSearch = $('topSearch');
  const closeSearch = $('closeSearch');
  if(searchIcon && topSearch && closeSearch){
    searchIcon.addEventListener("click", ()=> topSearch.classList.add("active"));
    closeSearch.addEventListener("click", ()=> topSearch.classList.remove("active"));
  }

  // 🔥 Dark mode
  const darkToggle = $('darkToggle');
  if(darkToggle){
    if(localStorage.getItem("mode")==="dark"){
      document.body.classList.add("dark");
      darkToggle.innerText="☀️ Light Mode";
    }
    darkToggle.addEventListener("click", ()=>{
      document.body.classList.toggle("dark");
      if(document.body.classList.contains("dark")){
        localStorage.setItem("mode","dark");
        darkToggle.innerText="☀️ Light Mode";
      } else {
        localStorage.setItem("mode","light");
        darkToggle.innerText="🌙 Dark Mode";
      }
    });
  }

  // 🔥 Google Translate
  window.googleTranslateElementInit=function(){
    if($('google_translate_element')){
      new google.translate.TranslateElement({pageLanguage:'mr'}, 'google_translate_element');
    }
  };
  const gtScript=document.createElement("script");
  gtScript.src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
  document.body.appendChild(gtScript);
}

loadMain();
</script>
</body>
</html>
