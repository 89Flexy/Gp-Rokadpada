<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GP Rokadpada</title>

  <!-- 🌙 Dark Mode CSS -->
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      background: #0f172a;
      color: white;
    }

    #themeToggle {
      position: fixed;
      top: 15px;
      right: 15px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 9999;
    }
  </style>

  <!-- 🌐 Google Translate -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'mr',
        includedLanguages: 'en,hi,mr'
      }, 'google_translate_element');
    }
  </script>

  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>
<body>

<!-- 🌐 Translate -->
<div id="google_translate_element" style="position:fixed; top:15px; left:15px; z-index:9999;"></div>

<!-- 🌙 Dark Mode Button -->
<button id="themeToggle">🌙</button>

<!-- 📄 👉 Yaha apna main.html ka FULL content paste kar -->
<div>
  <h1>Welcome to GP Rokadpada</h1>
  <p>Yaha apna pura content daal</p>
</div>

<!-- 🔥 Dark Mode Script -->
<script>
const toggleBtn = document.getElementById("themeToggle");

function setTheme(mode) {
  if (mode === "dark") {
    document.body.classList.add("dark");
    localStorage.setItem("theme", "dark");
    toggleBtn.textContent = "☀️";
  } else {
    document.body.classList.remove("dark");
    localStorage.setItem("theme", "light");
    toggleBtn.textContent = "🌙";
  }
}

// Load saved theme
const savedTheme = localStorage.getItem("theme");
if (savedTheme) setTheme(savedTheme);

// Toggle click
toggleBtn.addEventListener("click", () => {
  document.body.classList.contains("dark")
    ? setTheme("light")
    : setTheme("dark");
});
</script>

</body>
</html>
