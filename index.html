<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GP Rokadpada</title>

  <!-- ✅ Google Translate (MUST be in main page) -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'mr',
        includedLanguages: 'en,hi,mr'
      }, 'google_translate_element');
    }
  </script>

  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>
<body>

<!-- ✅ Translate container MUST be outside fetch -->
<div id="google_translate_element"></div>

<!-- App content -->
<div id="app"></div>

<script>
fetch("main.html")
.then(res => res.text())
.then(data => {
  const app = document.getElementById("app");
  app.innerHTML = data;

  // ✅ FIX 1: run inline scripts
  app.querySelectorAll("script").forEach(oldScript => {
    const newScript = document.createElement("script");

    if (oldScript.src) {
      // ✅ FIX 2: external scripts support
      newScript.src = oldScript.src;
      newScript.async = false;
    } else {
      newScript.textContent = oldScript.textContent;
    }

    document.body.appendChild(newScript);
  });
})
.catch(err => console.error("Fetch error:", err));
</script>

</body>
</html>
