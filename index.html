<!DOCTYPE html>  <html>  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>GP Rokadpada</title>  
</head>  
<body>  
  <div id="app"></div>
<script>

  // Now run your inline scripts
  const darkToggle = document.getElementById("darkToggle");
  if(darkToggle){
    if(localStorage.getItem("mode") === "dark"){
      document.body.classList.add("dark");
      darkToggle.innerText = "☀️ Light Mode";
    }
    darkToggle.addEventListener("click", ()=>{
      document.body.classList.toggle("dark");
      if(document.body.classList.contains("dark")){
        localStorage.setItem("mode","dark");
        darkToggle.innerText = "☀️ Light Mode";
      }else{
        localStorage.setItem("mode","light");
        darkToggle.innerText = "🌙 Dark Mode";
      }
    });
  }

  // Initialize Google Translate if needed
  if(typeof googleTranslateElementInit === "function"){
    googleTranslateElementInit();
  }
}

loadPage();
</script>  <script>  
fetch("main.html")  
.then(res => res.text())  
.then(data => {  
  document.getElementById("app").innerHTML = data;  
  
  // 🔥 IMPORTANT: re-run scripts  
  const scripts = document.querySelectorAll("#app script");  
  scripts.forEach(oldScript => {  
    const newScript = document.createElement("script");  
    newScript.textContent = oldScript.textContent;  
    document.body.appendChild(newScript);  
  });  
});  
</script>  </body>  
</html>
